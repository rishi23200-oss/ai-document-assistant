<!DOCTYPE html>
<html>

<head>
<title>AI Document Assistant</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

.container{
width:900px;
margin:auto;
padding:20px;
}

h1{
text-align:center;
}

.top-actions{
display:flex;
gap:10px;
margin-bottom:20px;
}

button{
padding:10px 15px;
border:none;
background:#2563eb;
color:white;
cursor:pointer;
border-radius:6px;
}

input,textarea{
width:100%;
padding:10px;
margin-top:8px;
border-radius:6px;
border:none;
}

.chat{
background:#020617;
height:400px;
overflow-y:auto;
padding:15px;
border-radius:10px;
margin-bottom:20px;
}

.user-msg{
background:#1e293b;
padding:10px;
margin:10px 0;
border-radius:6px;
}

.ai-msg{
background:#1d4ed8;
padding:10px;
margin:10px 0;
border-radius:6px;
}

.typing{
font-style:italic;
opacity:0.8;
}

.dark-toggle{
position:absolute;
right:20px;
top:20px;
}

</style>
</head>

<body>

<button class="dark-toggle" onclick="toggleTheme()">🌙</button>

<div class="container">

<h1>🤖 AI Document Assistant</h1>

<div class="top-actions">

<input type="file" id="pdfFile">
<button onclick="uploadPDF()">Upload PDF</button>

<input type="file" id="audioFile" accept="audio/*">
<button onclick="uploadAudio()">Upload Audio</button>

<button onclick="startRecording()">🎤 Record</button>

</div>

<div id="chatBox" class="chat"></div>

<input type="text" id="question" placeholder="Ask something from document">
<button onclick="askQuestion()">Ask</button>

<h3>Summarize Text</h3>

<textarea id="text" rows="4"></textarea>
<button onclick="summarize()">Summarize</button>

<div id="summary"></div>

</div>

<script src="script.js"></script>

</body>
</html>
